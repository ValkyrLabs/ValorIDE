openapi: 3.0.0
info:
  title: Task Management API
  version: 1.0.0
paths:
  /projects:
    get:
      summary: List projects
      operationId: listProjects
      responses:
        "200":
          description: Project list
    post:
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Project created
  /projects/{id}:
    get:
      summary: Get project
      operationId: getProject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
  /tasks:
    get:
      summary: List tasks
      operationId: listTasks
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Task list
    post:
      summary: Create task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created
  /tasks/{id}:
    get:
      summary: Get task
      operationId: getTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
    put:
      summary: Update task
      operationId: updateTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated
  /tasks/{id}/assign:
    post:
      summary: Assign task
      operationId: assignTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentRequest"
      responses:
        "200":
          description: Task assigned

components:
  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        owner:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
    ProjectCreate:
      type: object
      required:
        - name
        - ownerId
      properties:
        name:
          type: string
        description:
          type: string
        ownerId:
          type: string
    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - TODO
            - IN_PROGRESS
            - REVIEW
            - DONE
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
        assignee:
          $ref: "#/components/schemas/User"
        dueDate:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
    TaskCreate:
      type: object
      required:
        - title
        - projectId
      properties:
        title:
          type: string
        description:
          type: string
        projectId:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date
    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    AssignmentRequest:
      type: object
      required:
        - assigneeId
      properties:
        assigneeId:
          type: string
