apiVersion: v1
kind: Namespace
metadata:
  name: generated-app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: generated-app
data:
  APP_ENV: production
  JAVA_OPTS: "-Xmx512m -Xms256m"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: generated-app
type: Opaque
stringData:
  DATABASE_URL: "jdbc:postgresql://postgres:5432/appdb"
  DATABASE_USER: "appuser"
  DATABASE_PASSWORD: "changeme"
  JWT_SECRET: "your-jwt-secret-here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: generated-app
  namespace: generated-app
  labels:
    app: generated-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: generated-app
  template:
    metadata:
      labels:
        app: generated-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: generated-app
          image: ghcr.io/your-org/generated-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
            - containerPort: 8080
              name: backend
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: generated-app-svc
  namespace: generated-app
  labels:
    app: generated-app
spec:
  type: LoadBalancer
  selector:
    app: generated-app
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: backend
      port: 8080
      targetPort: 8080
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: generated-app-hpa
  namespace: generated-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: generated-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
